    let cart = [];
    let total = 0;

    function render() {
        const cont = document.getElementById('menu-container');
        cont.innerHTML = "";
        menuData.forEach(s => {
            cont.innerHTML += `<div class="category-title">${s.cat}</div>`;
            s.items.forEach(i => {
                cont.innerHTML += `
                    <div class="menu-item">
                        <img src="${i.img}" class="item-img" onerror="this.src='https://via.placeholder.com/70?text=Food'">
                        <div class="item-info"><h4>${i.n}</h4><p>${i.d}</p></div>
                        <div class="item-actions">
                            <span class="price">${i.p} с</span>
                            <button class="add-btn" onclick="add('${i.n}',${i.p})">+</button>
                        </div>
                    </div>`;
            });
        });
    }

    function add(n, p) {
        cart.push({n, p});
        total += p;
        document.getElementById('cartPanel').style.display = 'flex';
        document.getElementById('cartTotal').innerText = total;
    }

function sendOrder() {
    // Кардардан столдун номерин сурай турган терезе ачылат
    let table = prompt("Сураныч, столдун номерин жазыңыз:");

    // Эгер кардар эч нерсе жазбай "Отмена" басса, заказ кетпейт
    if (table == null || table == "") {
        alert("Столдун номерин жазуу керек!");
        return;
    }

    let text = `*ЗАКАЗ (Стол №${table})*%0A%0A`;
    cart.forEach((x, index) => {
        text += `${index + 1}. ${x.n} - ${x.p} сом%0A`;
    });
    text += `%0A*общая сумма: ${total} сом*`;

    window.location.href = "https://wa.me/996755665577?text=" + text;
}

    render();
